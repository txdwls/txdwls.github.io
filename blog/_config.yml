title: "txdwls'log"
description: "AI 엔지니어가 되기 위해 읽는 논문 기록"
lang: "ko-KR"
timezone: "Asia/Seoul"
url: "https://txdwls.github.io"
baseurl: ""

author:
  name: "Sungjin"
  bio: "AI engineering papers, reviewed for implementation decisions."

permalink: /reviews/:title/

collections:
  concepts:
    output: true
    permalink: /concepts/:name/

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: review
  - scope:
      path: ""
      type: concepts
    values:
      layout: page

markdown: kramdown
highlighter: rouge
kramdown:
  input: GFM
  hard_wrap: false
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    block:
      line_numbers: false

exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - WRITING.md
  - vendor
