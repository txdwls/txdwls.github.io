title: "txdwls'log"
description: "AI/ML 논문을 읽으면서 정리하는 기록"
lang: "ko-KR"
timezone: "Asia/Seoul"
url: "https://txdwls.github.io"
baseurl: ""

author:
  name: "Sungjin"
  bio: "AI/ML 논문 읽기 노트. 구현 판단과 실패 모드를 씁니다."

permalink: /reviews/:title/

collections:
  concepts:
    output: true
    permalink: /concepts/:name/

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: review
  - scope:
      path: ""
      type: concepts
    values:
      layout: page

markdown: kramdown
highlighter: rouge
kramdown:
  input: GFM
  hard_wrap: false
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    block:
      line_numbers: false

exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - WRITING.md
  - vendor
