---
layout: default
title: "Home"
---

<section class="home-intro" aria-labelledby="home-intro-title">
  <h1 id="home-intro-title">👋 Welcome to {{ site.title }}</h1>
  <p>
    공부한 논문과 개념을 잊지 않기 위해 기록합니다.
    읽고 끝내지 않고, 작게 구현해보며 이해한 내용을 함께 남깁니다.
  </p>
  <nav class="home-links" aria-label="Quick links">
    <a href="{{ '/concepts/' | relative_url }}" aria-label="개념 허브">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 6.5h7a3 3 0 0 1 3 3v10a3 3 0 0 0-3-3H4z"/><path d="M20 6.5h-7a3 3 0 0 0-3 3v10a3 3 0 0 1 3-3h7z"/></svg>
    </a>
    <a href="{{ '/reading-path/' | relative_url }}" aria-label="LLM·Vision 관심 논문">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M5 5h5v5H5z"/><path d="M14 5h5v5h-5z"/><path d="M5 14h5v5H5z"/><path d="M10 7.5h4M16.5 10v4M14 16.5h-4"/></svg>
    </a>
    <a href="{{ '/about/' | relative_url }}" aria-label="소개">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 19v-7"/><path d="M12 8h.01"/><circle cx="12" cy="12" r="9"/></svg>
    </a>
  </nav>
</section>

{% for post in site.posts %}
  <article class="post-entry">
    <header class="entry-header">
      <h2>{{ post.title }}</h2>
    </header>
    <footer class="entry-footer" aria-label="Post metadata">
      <time class="meta-item" datetime="{{ post.date | date_to_xmlschema }}">
        <span class="meta-label">날짜</span>
        {{ post.date | date: "%Y.%m.%d" }}
      </time>
      <span class="meta-item">
        <span class="meta-label">분류</span>
        {{ post.category }}
      </span>
    </footer>
    <a class="entry-link" aria-label="post link to {{ post.title }}" href="{{ post.url | relative_url }}"></a>
  </article>
{% endfor %}
