---
layout: default
title: "Home"
---

<article class="first-entry home-info">
  <header class="entry-header">
    <h1>AI/ML 논문 읽기 노트</h1>
  </header>
  <section class="entry-content">
    <p>논문 읽고 적어두는 노트.</p>
  </section>
  <footer class="entry-footer">
    txdwls'log paper notes.
  </footer>
</article>

{% for post in site.posts limit:10 %}
  <article class="post-entry">
    <header class="entry-header">
      <h2>{{ post.title }}</h2>
    </header>
    <section class="entry-content">
      <p>{{ post.excerpt | strip_html | truncate: 420 }}</p>
    </section>
    <footer class="entry-footer">
      날짜: {{ post.date | date: "%Y-%m-%d" }} | 분류: {{ post.category }}
    </footer>
    <a class="entry-link" aria-label="post link to {{ post.title }}" href="{{ post.url | relative_url }}"></a>
  </article>
{% endfor %}

<nav class="pagination" aria-label="블로그 탐색">
  <a class="next" href="{{ '/reading-path/' | relative_url }}">읽는 순서 »</a>
</nav>
