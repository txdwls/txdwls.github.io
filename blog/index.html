---
layout: default
title: "Home"
---

{% for post in site.posts %}
  <article class="post-entry">
    <header class="entry-header">
      <h2>{{ post.title }}</h2>
    </header>
    <section class="entry-content">
      <p>{{ post.excerpt | strip_html | truncate: 420 }}</p>
    </section>
    <footer class="entry-footer">
      날짜: {{ post.date | date: "%Y-%m-%d" }} | 분류: {{ post.category }}
    </footer>
    <a class="entry-link" aria-label="post link to {{ post.title }}" href="{{ post.url | relative_url }}"></a>
  </article>
{% endfor %}
