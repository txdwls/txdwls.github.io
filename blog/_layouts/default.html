<!doctype html>
<html lang="{{ site.lang | default: 'ko-KR' }}" dir="auto">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% if page.title %}{{ page.title }} · {% endif %}{{ site.title }}</title>
    <meta name="description" content="{{ page.description | default: site.description }}">
    <meta name="theme-color" content="#2e2e33">
    <script>
      (() => {
        const pref = localStorage.getItem("pref-theme");
        const systemDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
        if (pref === "dark" || (!pref && systemDark)) document.documentElement.classList.add("dark");
      })();
    </script>
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  </head>
  <body class="list">
    <header class="header">
      <nav class="nav">
        <div class="logo">
          <a href="{{ '/' | relative_url }}">{{ site.title }}</a>
        </div>
        <ul id="menu">
          <li><a href="{{ '/about/' | relative_url }}">소개</a></li>
          <li><a href="{{ '/concepts/' | relative_url }}">개념</a></li>
          <li><a href="{{ '/reading-path/' | relative_url }}">읽는 순서</a></li>
        </ul>
        <button id="theme-toggle" type="button" title="Toggle theme" aria-label="Toggle theme">
          <svg id="moon" viewBox="0 0 24 24" aria-hidden="true"><path d="M21 14.2A8.7 8.7 0 0 1 9.8 3a7 7 0 1 0 11.2 11.2Z" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
          <svg id="sun" viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="4" fill="none" stroke="currentColor" stroke-width="2"/><path d="M12 2v2m0 16v2M4.9 4.9l1.4 1.4m11.4 11.4 1.4 1.4M2 12h2m16 0h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        </button>
      </nav>
    </header>
    <main class="main">
      {{ content }}
    </main>
    <footer class="footer">
      <span>© {{ 'now' | date: '%Y' }} <a href="{{ '/' | relative_url }}">{{ site.title }}</a></span>
      <span>Powered by Jekyll</span>
    </footer>
    <script>
      document.getElementById("theme-toggle").addEventListener("click", () => {
        const isDark = document.documentElement.classList.toggle("dark");
        localStorage.setItem("pref-theme", isDark ? "dark" : "light");
      });
    </script>
    {% if page.math %}
      <script>
        window.MathJax = {
          tex: {
            inlineMath: [["$", "$"], ["\\(", "\\)"]],
            displayMath: [["$$", "$$"], ["\\[", "\\]"]],
            processEscapes: true
          },
          options: {
            skipHtmlTags: ["script", "noscript", "style", "textarea", "pre", "code"]
          }
        };
      </script>
      <script defer src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js"></script>
    {% endif %}
  </body>
</html>
