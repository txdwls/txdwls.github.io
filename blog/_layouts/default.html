<!doctype html>
<html lang="{{ site.lang | default: 'ko-KR' }}" dir="auto">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% if page.title %}{{ page.title }} · {% endif %}{{ site.title }}</title>
    <meta name="description" content="{{ page.description | default: site.description }}">
    <meta name="theme-color" content="#2e2e33">
    <link rel="icon" href="{{ '/assets/favicon.svg' | relative_url }}" type="image/svg+xml">
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
    <script>
      (() => {
        document.documentElement.classList.add("has-js");
        const pref = localStorage.getItem("pref-theme");
        const systemDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
        if (pref === "dark" || (!pref && systemDark)) document.documentElement.classList.add("dark");
      })();
    </script>
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  </head>
  <body class="list">
    <header class="header">
      <nav class="nav" aria-label="Primary">
        <div class="nav-brand">
          <div class="logo">
            <a href="{{ '/' | relative_url }}">{{ site.title }}</a>
          </div>
          <button id="theme-toggle" type="button" title="Toggle theme" aria-label="Toggle theme">
            <svg id="moon" class="theme-icon-moon" viewBox="0 0 24 24" aria-hidden="true"><circle class="moon-body" cx="11" cy="12" r="8"/><circle class="moon-cutout" cx="16.2" cy="9.8" r="8"/></svg>
            <svg id="sun" viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="4" fill="none" stroke="currentColor" stroke-width="2"/><path d="M12 2v2m0 16v2M4.9 4.9l1.4 1.4m11.4 11.4 1.4 1.4M2 12h2m16 0h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
          </button>
          <span class="nav-separator" aria-hidden="true">|</span>
        </div>
        <ul id="menu">
          <li><a href="{{ '/' | relative_url }}"{% if page.url == '/' %} aria-current="page"{% endif %}>Posts</a></li>
          <li><a href="{{ '/concepts/' | relative_url }}"{% if page.url == '/concepts/' %} aria-current="page"{% endif %}>Concepts</a></li>
          <li><a href="{{ '/about/' | relative_url }}"{% if page.url == '/about/' %} aria-current="page"{% endif %}>About</a></li>
        </ul>
      </nav>
    </header>
    <main class="main">
      {{ content }}
    </main>
    <footer class="footer">
      <span>© {{ 'now' | date: '%Y' }} <a href="{{ '/' | relative_url }}">{{ site.title }}</a></span>
      <span>Powered by Jekyll</span>
    </footer>
    <script defer src="{{ '/assets/js/site.js' | relative_url }}"></script>
    {% if page.math %}
      <script>
        window.MathJax = {
          tex: {
            inlineMath: [["$", "$"], ["\\(", "\\)"]],
            displayMath: [["$$", "$$"], ["\\[", "\\]"]],
            processEscapes: true
          },
          options: {
            skipHtmlTags: ["script", "noscript", "style", "textarea", "pre", "code"]
          }
        };
      </script>
      <script defer src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js"></script>
    {% endif %}
  </body>
</html>
